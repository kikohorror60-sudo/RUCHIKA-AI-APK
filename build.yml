name: Build Ruchika AI APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Extract ZIP and setup project
        run: |
          unzip RUCHIKA_AI_v10_READY.zip
          cd ruchika-project
          chmod +x gradlew
      - name: Build Debug APK
        run: |
          cd ruchika-project
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ruchika-apk
          path: ruchika-project/app/build/outputs/apk/debug/*.apk

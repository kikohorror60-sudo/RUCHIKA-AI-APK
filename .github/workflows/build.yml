name: Build Ruchika AI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle
        run: |
          sudo apt-get install -y gradle

      - name: Extract ZIP and setup project
        run: |
          unzip RUCHIKA_AI_v10_FIXED_FINAL.zip
          cd RUCHIKA_AI_v10_READY/ruchika-project
          gradle wrapper --gradle-version 9.3.1
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties
          echo "org.gradle.parallel=false" >> gradle.properties
          sed -i '/buildconfig/d' gradle.properties
          sed -i 's/compileSdk = 35/compileSdk = 36/' app/build.gradle.kts
          sed -i 's/targetSdk = 35/targetSdk = 36/' app/build.gradle.kts
      - name: Build Debug APK
        run: |
          cd RUCHIKA_AI_v10_READY/ruchika-project
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ruchika-AI-Debug-APK
          path: ruchika-project/app/build/outputs/apk/debug/*.apk
          retention-days: 30
